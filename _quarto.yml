project:
  type: website
  output-dir: _site

website:
  title: "Jonathan Pearce"
  description: "Personal website of Jonathan Pearce — projects, blog posts, datasets, and resources on data analytics, machine learning, and statistics."
  site-url: https://jonathan-pearce.github.io

  navbar:
    background: light
    right:
      - href: index.qmd
        text: Home
      - href: projects/index.qmd
        text: Projects
      - href: blog/index.qmd
        text: Blog
      - href: resources/index.qmd
        text: Resources

  search: true

  open-graph: true

format:
  html:
    theme: simplex
    css: custom.css
    toc: true
    code-fold: true
    code-copy: true
    highlight-style: github

execute:
  freeze: auto
